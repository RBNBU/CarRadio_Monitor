<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical APRS</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="dashboard">
        <header class="top-bar">
            <div class="brand">
                <span class="callsign-badge">ON3RBU-9</span>
                <h1>Tactical Feed</h1>
            </div>
            
            <div class="header-actions">
                <button id="btn-open-tx" class="tx-trigger-btn">
                    <span class="tx-icon">▲</span> TX MSG
                </button>

                <a href="https://carradio-monitor.com" target="_blank" class="monitor-link">
                    CarRadio Monitor ↗
                </a>

                <div class="status-pill">
                    <div class="pulse-dot"></div>
                    <span>LIVE RX</span>
                </div>
            </div>
        </header>
        
        <main id="log-container">
            <div id="log">
                <div class="empty-state">Waiting for radio traffic...</div>
            </div>
        </main>
    </div>

    <div id="tx-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <h2>Transmit Message</h2>
            <p class="modal-subtitle">Broadcast via 144.800 MHz</p>
            
            <div class="input-group">
                <label>Target Callsign</label>
                <input type="text" id="tx-target" placeholder="e.g. ON4ABC-9" maxlength="9" autocomplete="off" autocorrect="off" spellcheck="false">
            </div>

            <div class="input-group">
                <label>Message Payload</label>
                <input type="text" id="tx-message" placeholder="Type your message..." maxlength="67" autocomplete="off">
                <div class="char-count"><span id="char-counter">0</span> / 67</div>
            </div>

            <div class="modal-actions">
                <button id="btn-cancel-tx" class="btn-cancel">Cancel</button>
                <button id="btn-send-tx" class="btn-send">FIRE PACKET</button>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
